[tool.ruff]
line-length = 120
force-exclude = true
extend-exclude = [
    # Vendored WPT server runtime and bundled third-party modules.
    "Tests/LibWeb/Text/input/wpt-import/_wpttools",
]

[tool.ruff.lint]
# https://docs.astral.sh/ruff/rules/
extend-select = [
    "B", # flake8-bugbear
    "I", # isort
]

[tool.ruff.lint.isort]
force-single-line = true
lines-between-types = 1
